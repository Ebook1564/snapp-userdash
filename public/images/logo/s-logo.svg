<svg width="200" height="250" viewBox="0 0 200 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="s_gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF00FF" /> <!-- Magenta/Pink -->
      <stop offset="100%" stop-color="#4B0082" /> <!-- Deep Purple -->
    </linearGradient>
  </defs>

  <!-- Sparkle Shape -->
  <path d="M50 10 
           Q 60 40 90 50 
           Q 60 60 50 90 
           Q 40 60 10 50 
           Q 40 40 50 10 Z" 
        fill="url(#s_gradient)" />

  <!-- Main 'S' Shape Body -->
  <path d="M 80,45 
           C 160,20 180,60 110,100 
           C 60,130 50,150 140,165 
           Q 180,175 160,210 
           L 40,240 
           L 85,165 
           C 40,140 20,110 80,80 
           Q 110,65 80,45 Z" 
        fill="url(#s_gradient)" />
        
  <!-- Curve to separate sparkle from S body -->
  <path d="M 40,90 
           Q 70,60 130,45" 
        stroke="white" 
        stroke-width="5" 
        fill="transparent" />
</svg>
